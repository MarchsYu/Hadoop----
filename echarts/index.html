<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店客房出租率分析可视化展示</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f6fa;
            color: #333;
        }
        .container {
            width: 1200px;
            margin: 0 auto;
            padding: 24px 0 30px;
        }
        h1 {
            text-align: center;
            margin: 0 0 20px;
            font-size: 28px;
        }
        .panel {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 16px;
            padding: 10px;
        }
        .chart {
            width: 100%;
            height: 360px;
        }
        .tip {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>酒店客房出租率分析可视化展示</h1>
    <div class="tip">说明：优先读取 echarts/data 下静态 JSON；若未导出结果则展示示例数据。</div>

    <div class="panel">
        <div id="rankingChart" class="chart"></div>
    </div>
    <div class="panel">
        <div id="cityChart" class="chart"></div>
    </div>
    <div class="panel">
        <div id="roomTypeChart" class="chart"></div>
    </div>
</div>

<script src="./js/app.js"></script>
</body>
</html>
